<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kerry's Kitchen Garden">
<meta name="theme-color" content="#1a4210">
<title>Kerry's Kitchen Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:    #faf7f0;
  --cream2:   #f0ebe0;
  --ink:      #1a1810;
  --ink2:     #3a3020;
  --green:    #1a4210;
  --green2:   #2a6018;
  --green3:   #4a8830;
  --muted:    #6a5e48;
  --border:   #c8b890;
  --border2:  #d8cca8;
  --white:    #ffffff;
  --header-bg:   #d6e8c8;
  --header-ink:  #1a3210;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden; background: var(--cream2);
  font-family: 'Jost', Georgia, sans-serif; color: var(--ink);
  -webkit-font-smoothing: antialiased; font-size: 18px;
}
#app {
  height: 100%; display: flex; flex-direction: column;
  background: var(--cream2); max-width: 480px; margin: 0 auto;
  position: relative; overflow: hidden;
}
.screen {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  overflow: hidden; background: var(--cream);
  transition: transform 0.30s cubic-bezier(0.4,0,0.2,1), opacity 0.30s ease;
}
.screen.hidden     { transform: translateX(100%);  opacity: 0; pointer-events: none; }
.screen.slide-left { transform: translateX(-28%);  opacity: 0; pointer-events: none; }

#screen-home .header {
  background: var(--header-bg);
  padding: calc(var(--safe-top) + 20px) 20px 20px;
  flex-shrink: 0; border-bottom: 3px solid #8ab878;
}
.home-eyebrow { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #3a6028; opacity: .9; margin-bottom: 6px; }
.home-title   { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400; color: var(--header-ink); line-height: 1.15; }
.home-title em { font-style: italic; color: #5a1808; }
.home-sub     { font-size: 15px; color: #3a5028; margin-top: 6px; line-height: 1.4; }
.home-body    { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--safe-bot) + 20px); background: var(--cream); }

.map-wrap     { padding: 14px 16px 6px; background: var(--header-bg); }
.map-wrap svg { width: 100%; height: auto; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,.15); }
.bed-rect     { cursor: pointer; transition: opacity .15s; }
.bed-rect:active { opacity: .72; }

.bed-cards { padding: 8px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
.bed-card  { background: var(--white); border: 1.5px solid var(--border2); border-radius: 12px; padding: 13px 14px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background .12s, transform .10s; -webkit-tap-highlight-color: transparent; box-shadow: 0 1px 4px rgba(0,0,0,.07); }
.bed-card:active { background: var(--cream2); transform: scale(.98); }
.bed-card-num  { width: 48px; height: 48px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-size: 26px; color: white; flex-shrink: 0; }
.bed-card-info { flex: 1; min-width: 0; }
.bed-card-name { font-size: 18px; font-weight: 600; color: var(--ink); line-height: 1.2; }
.bed-card-dims { font-size: 14px; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bed-card-arrow { font-size: 24px; color: var(--border); flex-shrink: 0; line-height: 1; }

.back-bar { display: flex; align-items: center; padding: calc(var(--safe-top) + 10px) 14px 8px; flex-shrink: 0; background: var(--cream); border-bottom: 1px solid var(--border2); }
.back-btn { display: flex; align-items: center; gap: 5px; font-size: 17px; font-weight: 500; color: var(--green2); background: rgba(42,96,24,.08); border-radius: 20px; padding: 8px 16px 8px 12px; cursor: pointer; transition: background .12s; -webkit-tap-highlight-color: transparent; }
.back-btn:active { background: rgba(42,96,24,.16); }

#screen-bed { background: var(--cream); }
.bed-hero   { flex-shrink: 0; padding: 16px 18px 18px; background: var(--cream); border-bottom: 1px solid var(--border2); }
.bed-hero-number { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; margin-bottom: 4px; }
.bed-hero-name   { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: var(--ink); line-height: 1.15; }
.bed-hero-dims   { font-size: 15px; color: var(--muted); margin-top: 4px; }
.bed-hero-char   { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; line-height: 1.6; color: var(--ink2); margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border2); }

.bed-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 14px; padding-bottom: calc(var(--safe-bot) + 24px); background: var(--cream2); }
.plants-label { font-size: 12px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); padding: 0 2px 10px; }

.plant-card { background: var(--white); border: 1.5px solid var(--border2); border-radius: 12px; padding: 15px 14px; display: flex; align-items: flex-start; gap: 13px; cursor: pointer; margin-bottom: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.07); transition: background .12s, transform .10s; -webkit-tap-highlight-color: transparent; }
.plant-card:active { background: var(--cream2); transform: scale(.98); }
.plant-swatch     { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; flex-shrink: 0; }
.plant-card-body  { flex: 1; min-width: 0; }
.plant-card-name  { font-size: 18px; font-weight: 600; color: var(--ink); line-height: 1.25; }
.plant-card-latin { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--muted); margin-top: 2px; }
.plant-card-oneliner { font-size: 15px; color: var(--ink2); margin-top: 6px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.plant-tag-pill   { display: inline-block; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; padding: 3px 10px; border-radius: 10px; margin-top: 6px; background: var(--cream2); color: var(--muted); border: 1px solid var(--border); }
.plant-card-arrow { font-size: 24px; color: var(--border); margin-top: 4px; flex-shrink: 0; }

#screen-plant { background: var(--white); }
#screen-plant .back-bar { background: var(--white); }
.plant-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; background: var(--white); }

.plant-hero { padding: 18px 20px 20px; border-bottom: 1px solid var(--border2); background: var(--cream); }
.plant-hero-swatch   { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; margin-bottom: 14px; }
.plant-hero-name     { font-family: 'Cormorant Garamond', serif; font-size: 32px; font-weight: 400; color: var(--green); line-height: 1.15; }
.plant-hero-latin    { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-style: italic; color: var(--muted); margin-top: 3px; }
.plant-hero-oneliner { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-style: italic; line-height: 1.6; color: var(--ink2); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border2); }

.plant-meta       { padding: 14px 20px; display: flex; gap: 18px; flex-wrap: wrap; border-bottom: 1px solid var(--border2); background: var(--white); }
.plant-meta-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
.plant-meta-value { font-size: 17px; color: var(--ink); margin-top: 2px; font-weight: 500; }

.plant-section { padding: 20px 20px; border-bottom: 1px solid var(--border2); }
.plant-section:last-child { border-bottom: none; padding-bottom: calc(var(--safe-bot) + 36px); }
.plant-section-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.plant-section-label::after { content: ''; flex: 1; height: 1px; background: var(--border2); }
.plant-section-icon { font-size: 16px; }
.plant-origin { font-size: 17px; color: var(--green2); font-weight: 600; line-height: 1.45; }
.plant-text   { font-family: 'Cormorant Garamond', serif; font-size: 20px; line-height: 1.85; color: var(--ink2); }
.plant-text p { margin-bottom: 1em; }
.plant-text p:last-child { margin-bottom: 0; }

.bed-body::-webkit-scrollbar,
.plant-body::-webkit-scrollbar,
.home-body::-webkit-scrollbar { display: none; }

#install-banner {
  position: fixed; bottom: calc(var(--safe-bot) + 16px); left: 50%;
  transform: translateX(-50%); background: var(--green); color: #c8f0a8;
  font-size: 13px; padding: 11px 18px; border-radius: 22px;
  box-shadow: 0 4px 20px rgba(0,0,0,.3); white-space: nowrap; z-index: 100;
  display: none; align-items: center; gap: 8px; max-width: calc(100% - 32px);
  cursor: pointer; border: 1.5px solid rgba(160,230,120,.25);
}
.fade-in { animation: fadeIn .35s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
</style>
</head>

<div id="app">

    <div class="home-body">
      <div class="map-wrap"><svg id="garden-map" viewBox="0 0 320 440" xmlns="http://www.w3.org/2000/svg">

</svg></div>
      <div class="bed-cards" id="bed-cards"></div>
    </div>
  </div>

  <div id="screen-bed" class="screen hidden">
    <div class="back-bar" onclick="goHome()">
      <div class="back-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>

const PLANTS = {
  1: {
    name: `Globe Artichoke 'Green Globe'`,
    latin: `Cynara scolymus`,
    qty: `3 seedlings`,
    tag: `North end · 1.5m wide section`,
    color: `#4a7830`,
    emoji: `🌿`,
    oneliner: `The classic kitchen garden artichoke — large, bold, unmistakable. In continuous cultivation since the Renaissance and still the definitive variety for a serious kitchen.`,
    origin: `Mediterranean · cultivated since ancient Rome · Green Globe developed in France and Italy`,
    history: `The globe artichoke as a cultivated plant was developed from the wild cardoon in the gardens of Naples and Sicily during the fifteenth century, likely under Arab influence — the Arabic al-kharshuf giving the vegetable its name through Spanish and Italian. Catherine de' Medici, who arrived in France as a teenager to marry the future Henri II in 1533, is said to have brought artichoke cultivation north with her from Florence, thereby introducing it to French haute cuisine where it has remained ever since.

Green Globe is the standard-bearing variety of the kitchen garden tradition — large, tightly-budded, with the classic architecture of overlapping grey-green bracts that any cook recognises immediately. It is the artichoke of the French potager and the Italian orto, grown continuously for centuries without significant change because nothing has needed improving.`,
    kitchen: `Every part of the artichoke is edible at different stages of its development. The immature bud, the stem, the bracts, the heart, and the base can each be approached differently. The plant contains cynarin, a compound that makes everything tasted afterward seem sweeter — a remarkable property that makes artichokes one of the most wine-unfriendly vegetables at the table, but endlessly fascinating as a palate modifier.

At the festival in August, first-year plants will be establishing rather than budding — but the architectural foliage alone is striking and immediately recognisable. A chef of Guy Jeffreys' calibre will know them on sight and understand exactly what they'll become.`,
    growing: `Planted as seedlings in March. Needs full sun and rich, well-drained soil — sheep manure worked into the planting hole at depth is ideal. Space 80–90cm apart in the wide north end of Bed 1. Water every 2–3 days for the first month while establishing, then back off. First-year plants will not produce harvestable buds — these come in year two. Watch for slugs and snails on young foliage in the first weeks.`

    qty: `1 seedling`,

    emoji: `🥦`,
    oneliner: `A cauliflower that earns its place visually as well as culinarily — the purple pigment from anthocyanins, the same compounds in red wine and blueberries.`,

let currentBed = null;

function showScreen(id, direction) {
  document.querySelectorAll('.screen').forEach(s => {
    if (s.id === id) {
      s.classList.remove('hidden','slide-left');
    } else if (!s.classList.contains('hidden')) {
      s.classList.add(direction === 'forward' ? 'slide-left' : 'hidden');
      setTimeout(() => s.classList.add('hidden'), 340);
    }
  });
}

function goHome() { showScreen('screen-home','back'); currentBed = null; }
function goBed(bedId) {
  currentBed = bedId;
  renderBed(bedId);
  document.getElementById('plant-back-label').textContent = BEDS[bedId].name;
  showScreen('screen-bed','forward');
}
function goPlant(pid) { renderPlant(pid); showScreen('screen-plant','forward'); }
function goBackToBed() { currentBed ? showScreen('screen-bed','back') : goHome(); }

function renderHome() {
  const container = document.getElementById('bed-cards');
  container.innerHTML = '';
  Object.keys(BEDS).forEach(id => {
    const bed = BEDS[id];
    const card = document.createElement('div');
    card.className = 'bed-card';
    card.onclick = () => goBed(id);
    card.innerHTML = `
      <div class="bed-card-num" style="background:${bed.color}">${id}</div>
      <div class="bed-card-info">
        <div class="bed-card-name">${bed.name}</div>
        <div class="bed-card-dims">${bed.dims}</div>
      </div>
      <div class="bed-card-arrow">›</div>`;
    container.appendChild(card);
  });
  document.querySelectorAll('.bed-rect').forEach(el => {
    el.onclick = () => { const bid = el.getAttribute('data-bed'); if (bid) goBed(bid); };
  });
}

function renderBed(bedId) {
  const bed = BEDS[bedId];
  const hero = document.getElementById('bed-hero');
  hero.style.borderBottom = `3px solid ${bed.color}`;
  hero.innerHTML = `
    <div class="bed-hero-number" style="color:${bed.color}">${bed.nickname}</div>
    <div class="bed-hero-name">${bed.name}</div>
    <div class="bed-hero-dims">${bed.dims}</div>
    <div class="bed-hero-char">${bed.character}</div>`;
  const list = document.getElementById('plant-list');
  list.innerHTML = '';
  bed.plants.forEach(pid => {
    const p = PLANTS[pid];
    if (!p) return;
    const card = document.createElement('div');
    card.className = 'plant-card fade-in';
    card.onclick = () => goPlant(pid);
    card.innerHTML = `
      <div class="plant-swatch" style="background:${p.color}">${p.emoji}</div>
      <div class="plant-card-body">
        <div class="plant-card-name">${p.name}</div>
        <div class="plant-card-latin">${p.latin}</div>
        <div class="plant-card-oneliner">${p.oneliner}</div>
        ${p.tag ? `<div class="plant-tag-pill">${p.tag}</div>` : ''}
      </div>
      <div class="plant-card-arrow">›</div>`;
    list.appendChild(card);
  });
}

function renderPlant(pid) {
  const p = PLANTS[pid];
  if (!p) return;
  document.getElementById('plant-back-btn').onclick = goBackToBed;
  function paras(text) {
    return text.trim().split('\n\n').map(t => `<p>${t.trim()}</p>`).join('');
  }
  const body = document.getElementById('plant-body');
  body.scrollTop = 0;
  body.innerHTML = `
    <div class="plant-hero fade-in">
      <div class="plant-hero-swatch" style="background:${p.color}">${p.emoji}</div>
      <div class="plant-hero-name">${p.name}</div>
      <div class="plant-hero-latin">${p.latin}</div>
      <div class="plant-hero-oneliner">${p.oneliner}</div>
    </div>
    <div class="plant-meta">
      <div class="plant-meta-item">
        <div class="plant-meta-label">Quantity</div>
        <div class="plant-meta-value">${p.qty}</div>
      </div>
      ${p.tag ? `<div class="plant-meta-item">
        <div class="plant-meta-label">Notes</div>
        <div class="plant-meta-value">${p.tag}</div>
      </div>` : ''}
    </div>
    <div class="plant-section">
      <div class="plant-section-label"><span class="plant-section-icon">🌍</span>Origin</div>
      <div class="plant-origin">${p.origin}</div>
    </div>
    <div class="plant-section">
      <div class="plant-section-label"><span class="plant-section-icon">📜</span>History</div>
      <div class="plant-text">${paras(p.history)}</div>
    </div>
    ${p.growing ? `<div class="plant-section">
      <div class="plant-section-label"><span class="plant-section-icon">🌱</span>Growing Conditions</div>
      <div class="plant-text"><p>${p.growing}</p></div>
    </div>` : ''}
    <div class="plant-section">
      <div class="plant-section-label"><span class="plant-section-icon">🍽</span>In the Kitchen</div>
      <div class="plant-text">${paras(p.kitchen)}</div>
    </div>`;
}

let deferredPrompt;
const banner = document.getElementById('install-banner');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredPrompt = e; banner.style.display = 'flex';
});
banner.addEventListener('click', async () => {
  if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt = null; }
  banner.style.display = 'none';
});
function dismissBanner() { banner.style.display = 'none'; }

function checkiOS() {
  const isIOS = /iphone|ipad|ipod/.test(navigator.userAgent.toLowerCase());
  if (isIOS && !window.navigator.standalone && !sessionStorage.getItem('ios-hint')) {
    sessionStorage.setItem('ios-hint','1');
    banner.innerHTML = '<span>⬆</span> Tap Share then "Add to Home Screen" to install';
    banner.style.display = 'flex';
    setTimeout(() => { banner.style.display = 'none'; }, 8000);
  }
}

renderHome();
checkiOS();
</script>
